services:
  route53-ddns:
    image: ghcr.io/borzilleri/route53_ddns:${VERSION:-latest}
    ports:
      - 8080:8080
    labels:
      wud.watch: true
      wud.tag.include: '^\d+\.\d+\.\d+$'
      wud.link.template: 'https://github.com/borzilleri/route53_ddns/releases/tag/v$${original}'
    environment:
      AWS_SHARED_CREDENTIALS_FILE: /run/secrets/aws_credentials
      AWS_DEFAULT_REGION: us-west-2
    secrets:
      - aws_credentials
    volumes:
      - /opt/docker_data/route53-ddns/config/config.yaml:/config.yaml:ro

secrets:
  aws_credentials:
    file: /opt/docker_data/route53-ddns/secrets/aws_credentials
